services:
  sarif:
    build: .
    ports:
      - "3002:3002"
    environment:
      HOST: "0.0.0.0"
      PORT: "3002"
      SARIF_DB_PATH: /data/sarif.db
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:' + process.env.PORT + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
